name: Build nginx

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-amd64:
    runs-on: ubuntu-24.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc g++ make zlib1g-dev \
            libxml2-dev libxslt1-dev libgd-dev libgeoip-dev \
            libgoogle-perftools-dev libperl-dev perl git cmake wget libatomic-ops-dev

      - name: Download PCRE source
        run: |
          # Try multiple mirrors for PCRE 8.45
          wget -qO /tmp/pcre.tar.bz2 "https://sourceforge.net/projects/pcre/files/pcre/8.45/pcre-8.45.tar.bz2/download" || \
          wget -qO /tmp/pcre.tar.gz "https://sourceforge.net/projects/pcre/files/pcre/8.45/pcre-8.45.tar.gz/download" || \
          wget -qO /tmp/pcre.tar.bz2 "https://netcologne.dl.sourceforge.net/project/pcre/pcre/8.45/pcre-8.45.tar.bz2" || \
          wget -qO /tmp/pcre.tar.gz "https://managedway.dl.sourceforge.net/project/pcre/pcre/8.45/pcre-8.45.tar.gz"
          if tar xf /tmp/pcre.tar.* -C /tmp 2>/dev/null; then
            echo "PCRE extracted successfully"
          else
            echo "PCRE download failed, using system libpcre3-dev"
            sudo apt install -y libpcre3-dev
            touch /tmp/use_system_pcre
          fi

      - name: Build mimalloc
        run: |
          wget -qO /tmp/mimalloc.tar.gz https://github.com/microsoft/mimalloc/archive/refs/tags/v2.1.9.tar.gz
          mkdir -p /tmp/mimalloc-src && tar xzf /tmp/mimalloc.tar.gz -C /tmp/mimalloc-src --strip-components=1
          cd /tmp/mimalloc-src
          cmake -B out -DCMAKE_BUILD_TYPE=Release -DMI_BUILD_TESTS=OFF
          make -C out -j$(nproc) && sudo make -C out install && sudo ldconfig

      - name: Build quictls (OpenSSL + QUIC)
        run: |
          git clone --depth 1 --branch openssl-3.3.0-quic1 https://github.com/quictls/openssl.git /tmp/quictls
          cd /tmp/quictls
          ./Configure linux-x86_64 --prefix=/usr/local/quictls --openssldir=/usr/local/quictls/ssl \
            enable-ktls enable-ec_nistp_64_gcc_128 shared
          make -j$(nproc) && sudo make install

      - name: Clone nginx modules
        run: |
          git clone --depth 1 --recurse-submodules https://github.com/google/ngx_brotli.git /tmp/ngx_brotli
          git clone --depth 1 https://github.com/vision5/ngx_devel_kit.git /tmp/ngx_devel_kit

      - name: Build nginx amd64
        run: |
          set -e
          wget -qO /tmp/nginx.tar.gz https://nginx.org/download/nginx-1.30.1.tar.gz
          tar xzf /tmp/nginx.tar.gz -C /tmp
          cd /tmp/nginx-1.30.1
          # Build configure args
          PCRE_ARG="--with-pcre=/tmp/pcre-8.45 --with-pcre-jit"
          if [ -f /tmp/use_system_pcre ]; then
            PCRE_ARG="--with-pcre --with-pcre-jit"
          fi
          ./configure --prefix=/etc/nginx --sbin-path=/usr/sbin/nginx --modules-path=/usr/lib/nginx/modules \
            --conf-path=/etc/nginx/nginx.conf --error-log-path=/var/log/nginx/error.log \
            --http-log-path=/var/log/nginx/access.log --pid-path=/run/nginx.pid --lock-path=/run/nginx.lock \
            --http-client-body-temp-path=/var/cache/nginx/client_temp \
            --http-proxy-temp-path=/var/cache/nginx/proxy_temp \
            --http-fastcgi-temp-path=/var/cache/nginx/fastcgi_temp \
            --http-uwsgi-temp-path=/var/cache/nginx/uwsgi_temp \
            --http-scgi-temp-path=/var/cache/nginx/scgi_temp \
            --user=www-data --group=www-data --with-compat --with-file-aio --with-threads --with-libatomic \
            --with-http_ssl_module --with-http_v2_module --with-http_v3_module \
            --with-http_realip_module --with-http_addition_module --with-http_sub_module \
            --with-http_dav_module --with-http_flv_module --with-http_mp4_module \
            --with-http_gunzip_module --with-http_gzip_static_module \
            --with-http_auth_request_module --with-http_random_index_module \
            --with-http_secure_link_module --with-http_degradation_module \
            --with-http_slice_module --with-http_stub_status_module \
            --with-http_xslt_module=dynamic --with-http_perl_module=dynamic \
            --with-stream --with-stream_ssl_module --with-stream_ssl_preread_module --with-stream_realip_module \
            $PCRE_ARG \
            --add-module=/tmp/ngx_brotli --add-module=/tmp/ngx_devel_kit \
            --with-openssl=/tmp/quictls --with-openssl-opt='enable-ktls enable-ec_nistp_64_gcc_128' \
            --with-cc-opt='-g -O3 -pipe -Wformat -Werror=format-security -Wp,-D_FORTIFY_SOURCE=2 -fexceptions -fstack-protector-strong --param=ssp-buffer-size=4 -DTCP_FASTOPEN=23 -mtune=generic -fPIC' \
            --with-ld-opt="-Wl,-Bsymbolic-functions -flto=auto -ffat-lto-objects -Wl,-z,relro -Wl,-z,now -Wl,-E -Wl,--as-needed -fPIC -L /usr/local/lib -lmimalloc"
          if ! make -j$(nproc); then
            echo "=== CONFIGURE ERROR LOG ==="
            cat objs/autoconf.err 2>/dev/null || true
            echo "=== CONFIG.LOG (last 100 lines) ==="
            tail -100 config.log 2>/dev/null || true
            exit 1
          fi
          strip -s objs/nginx && mv objs/nginx /tmp/nginx-amd64

      - name: Upload amd64 binary
        uses: actions/upload-artifact@v4
        with:
          name: nginx-amd64
          path: /tmp/nginx-amd64
          compression-level: 0

  build-arm64:
    runs-on: ubuntu-24.04
    steps:
      - name: Set up QEMU for arm64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build nginx for arm64 via Docker
        run: |
          docker run --platform linux/arm64 -v /tmp:/tmp --rm \
            debian:bookworm-slim bash -c "
              apt update && apt install -y wget xz-utils build-essential gcc g++ make \
                zlib1g-dev libxml2-dev libxslt1-dev libgd-dev libgeoip-dev \
                libgoogle-perftools-dev libperl-dev perl git cmake libatomic-ops-dev

              # PCRE
              wget -qO /tmp/pcre.tar.bz2 https://sourceforge.net/projects/pcre/files/pcre/8.45/pcre-8.45.tar.bz2
              tar xf /tmp/pcre.tar.bz2 -C /tmp

              # mimalloc
              wget -qO /tmp/mimalloc.tar.gz https://github.com/microsoft/mimalloc/archive/refs/tags/v2.1.9.tar.gz
              mkdir -p /tmp/mimalloc-src && tar xzf /tmp/mimalloc.tar.gz -C /tmp/mimalloc-src --strip-components=1
              cd /tmp/mimalloc-src && cmake -B out -DCMAKE_BUILD_TYPE=Release -DMI_BUILD_TESTS=OFF && make -C out -j\$(nproc) && make -C out install && ldconfig

              # quictls
              git clone --depth 1 --branch openssl-3.3.0-quic1 https://github.com/quictls/openssl.git /tmp/quictls
              cd /tmp/quictls
              ./Configure linux-aarch64 --prefix=/usr/local/quictls --openssldir=/usr/local/quictls/ssl \
                enable-ktls enable-ec_nistp_64_gcc_128 shared
              make -j\$(nproc) && make install

              # nginx modules
              git clone --depth 1 --recurse-submodules https://github.com/google/ngx_brotli.git /tmp/ngx_brotli
              git clone --depth 1 https://github.com/vision5/ngx_devel_kit.git /tmp/ngx_devel_kit

              # nginx
              wget -qO /tmp/nginx.tar.gz https://nginx.org/download/nginx-1.30.1.tar.gz
              tar xzf /tmp/nginx.tar.gz -C /tmp
              cd /tmp/nginx-1.30.1
              ./configure --prefix=/etc/nginx --sbin-path=/usr/sbin/nginx --modules-path=/usr/lib/nginx/modules \
                --conf-path=/etc/nginx/nginx.conf --error-log-path=/var/log/nginx/error.log \
                --http-log-path=/var/log/nginx/access.log --pid-path=/run/nginx.pid --lock-path=/run/nginx.lock \
                --http-client-body-temp-path=/var/cache/nginx/client_temp \
                --http-proxy-temp-path=/var/cache/nginx/proxy_temp \
                --http-fastcgi-temp-path=/var/cache/nginx/fastcgi_temp \
                --http-uwsgi-temp-path=/var/cache/nginx/uwsgi_temp \
                --http-scgi-temp-path=/var/cache/nginx/scgi_temp \
                --user=www-data --group=www-data --with-compat --with-file-aio --with-threads --with-libatomic \
                --with-http_ssl_module --with-http_v2_module --with-http_v3_module \
                --with-http_realip_module --with-http_addition_module --with-http_sub_module \
                --with-http_dav_module --with-http_flv_module --with-http_mp4_module \
                --with-http_gunzip_module --with-http_gzip_static_module \
                --with-http_auth_request_module --with-http_random_index_module \
                --with-http_secure_link_module --with-http_degradation_module \
                --with-http_slice_module --with-http_stub_status_module \
                --with-http_xslt_module=dynamic --with-http_perl_module=dynamic \
                --with-stream --with-stream_ssl_module --with-stream_ssl_preread_module --with-stream_realip_module \
                $PCRE_ARG \
                --add-module=/tmp/ngx_brotli --add-module=/tmp/ngx_devel_kit \
                --with-openssl=/tmp/quictls --with-openssl-opt='enable-ktls enable-ec_nistp_64_gcc_128' \
                --with-cc-opt='-g -O3 -pipe -Wformat -Werror=format-security -Wp,-D_FORTIFY_SOURCE=2 -fexceptions -fstack-protector-strong --param=ssp-buffer-size=4 -DTCP_FASTOPEN=23 -mtune=generic -fPIC' \
                --with-ld-opt='-Wl,-Bsymbolic-functions -flto=auto -ffat-lto-objects -Wl,-z,relro -Wl,-z,now -Wl,-E -Wl,--as-needed -fPIC -L /usr/local/lib -lmimalloc'
              make -j\$(nproc) && strip -s objs/nginx && cp objs/nginx /tmp/nginx-arm64
            "

      - name: Upload arm64 binary
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64
          path: /tmp/nginx-arm64
          compression-level: 0
